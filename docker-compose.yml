# Despliegue de producción — construye imágenes estáticas con `docker build`, sin hot-reload.
# Para desarrollo local (Mac, Windows o Linux) usá docker-compose.dev.yml, no este archivo:
# cambios en el código NO se reflejan acá hasta reconstruir manualmente las imágenes.

services:
  postgres:
    image: postgres:16-alpine
    container_name: gestcon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-gestcon}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: gestcon_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestcon_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./backend/migrations:/app/migrations:ro

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestcon_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/nginx/certs:/etc/nginx/certs:ro

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: postgres
    command: ["node", "migrations/run.js", "--seed"]
    restart: "no"

volumes:
  postgres_data:
