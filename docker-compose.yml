services:
  postgres:
    image: postgres:16-alpine
    container_name: taskflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-taskflow}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: taskflow_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      # SHOW_RESET_TOKEN debe estar ausente en producción — solo activar en desarrollo local
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./backend/migrations:/app/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskflow_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

  # Crea la base de datos n8n si no existe (se ejecuta una sola vez y termina)
  n8n-db-init:
    image: postgres:16-alpine
    container_name: taskflow_n8n_db_init
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD:-postgres}
    command:
      - sh
      - -c
      - "psql -h postgres -U ${DB_USER:-postgres} -lqt | cut -d'|' -f1 | grep -qw n8n || psql -h postgres -U ${DB_USER:-postgres} -c 'CREATE DATABASE n8n'"

  n8n:
    image: n8nio/n8n:latest
    container_name: taskflow_n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      n8n-db-init:
        condition: service_completed_successfully
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_EDITOR_BASE_URL: http://192.168.1.12:5678
      WEBHOOK_URL: http://192.168.1.12:5678/
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${DB_USER:-postgres}
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD:-postgres}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      GENERIC_TIMEZONE: America/Bogota
      TZ: America/Bogota
    volumes:
      - n8n_data:/home/node/.n8n

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: postgres
    command: ["node", "migrations/run.js", "--seed"]
    profiles: ["migrate"]

volumes:
  postgres_data:
  n8n_data:
